<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Minha Mochila de Matérias</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: linear-gradient(to right, #ffe4ec, #ffffff);
    }

    .topo {
        background-color: #ff69b4;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 22px;
        font-weight: bold;
    }

    .container {
        padding: 20px;
    }

    .card {
        background-color: #fff;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 12px;
        box-shadow: 0px 3px 8px rgba(0,0,0,0.15);
        transition: 0.3s;
    }

    .card:hover {
        transform: scale(1.02);
    }

    .mat { border-left: 8px solid #ff69b4; }
    .hum { border-left: 8px solid #ff85c1; }
    .tec { border-left: 8px solid #ff4da6; }
    .bio { border-left: 8px solid #ff99cc; }
    .exatas { border-left: 8px solid #ff66b2; }

    .btn {
        background-color: #ff69b4;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 8px;
        cursor: pointer;
        margin: 10px;
    }

    .btn:hover {
        background-color: #ff4da6;
    }
</style>
</head>

<body>

<div class="topo">
    🎒 Minha Mochila de Matérias
</div>

<div style="text-align:center;">
    <button class="btn" onclick="ativarEdicao()">✏️ Editar página</button>
    <button class="btn" onclick="salvar()">💾 Salvar</button>
</div>

<div class="container" id="conteudo">

    <div class="card exatas"><h2>📐 Matemática</h2></div>
    <div class="card hum"><h2>📜 História</h2></div>
    <div class="card hum"><h2>🌱 Projeto de Vida</h2></div>
    <div class="card hum"><h2>🇺🇸 Inglês</h2></div>
    <div class="card hum"><h2>📖 Português</h2></div>
    <div class="card hum"><h2>🌍 Geografia</h2></div>
    <div class="card bio"><h2>🧪 Práticas Experimentais</h2></div>
    <div class="card bio"><h2>🧬 Biologia</h2></div>
    <div class="card tec"><h2>💻 Sistemas Operacionais</h2></div>
    <div class="card tec"><h2>🌐 Programação Web</h2></div>
    <div class="card tec"><h2>🧠 Lógica de Programação</h2></div>
    <div class="card hum"><h2>🎨 Artes</h2></div>
    <div class="card hum"><h2>👥 Sociologia</h2></div>
    <div class="card hum"><h2>🤔 Filosofia</h2></div>
    <div class="card exatas"><h2>⚗️ Química</h2></div>
    <div class="card exatas"><h2>⚡ Física</h2></div>
    <div class="card bio"><h2>🏃 Educação Física</h2></div>

</div>

<script>
function ativarEdicao() {
    document.getElementById("conteudo").contentEditable = true;
    alert("Modo edição ativado!");
}

function salvar() {
    const conteudo = document.getElementById("conteudo").innerHTML;
    localStorage.setItem("mochila", conteudo);
    alert("Salvo com sucesso!");
}

// carregar automaticamente
window.onload = function() {
    const salvo = localStorage.getItem("mochila");
    if (salvo) {
        document.getElementById("conteudo").innerHTML = salvo;
    }
}
</script>

</body>
    <a href="direitos.html">D.H</a>
</html>
