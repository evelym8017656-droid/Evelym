```html
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Portal de Estudos</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
}

/* MENU LATERAL */
.menu {
    width: 220px;
    height: 100vh;
    background: #ff69b4;
    color: white;
    padding-top: 20px;
    position: fixed;
}

.menu h2 {
    text-align: center;
}

.menu a {
    display: block;
    color: white;
    padding: 12px;
    text-decoration: none;
    transition: 0.3s;
}

.menu a:hover {
    background: #ff4da6;
}

/* CONTEÚDO */
.conteudo {
    margin-left: 220px;
    padding: 20px;
    width: 100%;
    background: linear-gradient(to right, #ffe4ec, #ffffff);
    min-height: 100vh;
}

.card {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 12px;
    box-shadow: 0px 3px 8px rgba(0,0,0,0.15);
}

.btn {
    background-color: #ff69b4;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
}

/* ESCONDER PÁGINAS */
.pagina {
    display: none;
}

.ativa {
    display: block;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="menu">
    <h2>📚 Portal</h2>
    <a href="#" onclick="mostrarPagina('home')">🏠 Início</a>
    <a href="#" onclick="mostrarPagina('so')">💻 Sistemas Operacionais</a>
    <a href="#" onclick="mostrarPagina('contato')">📞 Contato</a>
</div>

<!-- CONTEÚDO -->
<div class="conteudo">

    <!-- HOME -->
    <div id="home" class="pagina ativa">
        <div class="card">
            <h2>Bem-vinda 👋</h2>
            <p>Esse é seu portal de estudos!</p>
        </div>
    </div>

    <!-- SISTEMAS OPERACIONAIS -->
    <div id="so" class="pagina">
        <div class="card">
            <h2>💻 Desktop</h2>
            <p>Ex: Windows</p>
        </div>

        <div class="card">
            <h2>📱 Mobile</h2>
            <p>Ex: Android</p>
        </div>

        <div class="card">
            <h2>🌐 Servidores</h2>
            <p>Hospedam sites</p>
        </div>

        <div class="card">
            <h2>🤖 Embarcados</h2>
            <p>TV, carro, micro-ondas</p>
        </div>
    </div>

    <!-- CONTATO -->
    <div id="contato" class="pagina">
        <div class="card">
            <h2>📞 Contato</h2>
            <p>Email: seuemail@gmail.com</p>
        </div>
    </div>

</div>

<script>
function mostrarPagina(paginaId) {
    let paginas = document.querySelectorAll(".pagina");
    paginas.forEach(p => p.classList.remove("ativa"));

    document.getElementById(paginaId).classList.add("ativa");
}
</script>

</body>
</html>
```
