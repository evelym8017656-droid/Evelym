```html
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Portal Completo</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
}

/* MENU */
.menu {
    width: 220px;
    height: 100vh;
    background: #ff69b4;
    color: white;
    padding-top: 20px;
    position: fixed;
}

.menu h2 {
    text-align: center;
}

.menu button {
    width: 100%;
    padding: 12px;
    border: none;
    background: none;
    color: white;
    cursor: pointer;
    text-align: left;
}

.menu button:hover {
    background: #ff4da6;
}

/* CONTEÚDO */
.conteudo {
    margin-left: 220px;
    padding: 20px;
    width: 100%;
    background: linear-gradient(to right, #ffe4ec, #ffffff);
    min-height: 100vh;
}

.card {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 12px;
    box-shadow: 0px 3px 8px rgba(0,0,0,0.15);
}

/* PÁGINAS */
.pagina {
    display: none;
}

.ativa {
    display: block;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="menu">
    <h2>📚 Portal</h2>
    <button onclick="mostrarPagina('home')">🏠 Início</button>
    <button onclick="mostrarPagina('so')">💻 Sistemas</button>
    <button onclick="mostrarPagina('contato')">📞 Contato</button>
</div>

<!-- CONTEÚDO -->
<div class="conteudo">

    <!-- HOME -->
    <div id="home" class="pagina ativa">
        <div class="card">
            <h2>Bem-vinda 👋</h2>
            <p>Seu portal está funcionando!</p>
        </div>
    </div>

    <!-- SISTEMAS -->
    <div id="so" class="pagina">
        <div class="card">
            <h3>💻 Desktop</h3>
            <p>Ex: Windows</p>
            <p>👉 Computadores pessoais</p>
        </div>

        <div class="card">
            <h3>📱 Mobile</h3>
            <p>Ex: Android</p>
            <p>👉 Celulares</p>
        </div>

        <div class="card">
            <h3>🌐 Servidor</h3>
            <p>👉 Hospedam sites</p>
        </div>

        <div class="card">
            <h3>🤖 Embarcados</h3>
            <p>👉 TV, carro, micro-ondas</p>
        </div>
    </div>

    <!-- CONTATO -->
    <div id="contato" class="pagina">
        <div class="card">
            <h2>📞 Contato</h2>
            <p>Email: seuemail@gmail.com</p>
        </div>
    </div>

</div>

<script>
function mostrarPagina(id) {
    let paginas = document.querySelectorAll(".pagina");
    paginas.forEach(p => p.classList.remove("ativa"));

    document.getElementById(id).classList.add("ativa");
}
</script>

</body>
</html>
```
